name: Calculate Grade

on: push

jobs:
  test:
    runs-on: ubuntu-latest
    container:
      image: gradle:8.0.2-jdk17
    services:
      selenium:
        image: selenium/standalone-chrome:latest
        options: --shm-size=2g
    steps:
      - uses: actions/checkout@v4
      - name: Wait for Selenium to be ready
        run: timeout 60 bash -c 'until curl -sSf http://selenium:4444/wd/hub/status 2>/dev/null; do sleep 2; done'
      - name: Run tests
        run: gradle test
      - name: Upload test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-reports
          path: build/reports/

  grade:
    runs-on: ubuntu-latest
    container:
      image: python:3.12-slim
    steps:
      - uses: actions/checkout@v4
      - run: pip install pyyaml
      - run: python .github/scripts/calculate_grade.py points.yml
